<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
 
</head>
<body>
  <main>
    <article class="card">
      <img src="./assets/images/illustration-article.svg" alt="ilustração representando um artigo sobre HTML e CSS">

      <div class="card-content">
        <span class="tag">Learning</span>

        <p class="date">Published 21 Dec 2023</p>

        <h1>
          <a href="#">HTML & CSS foundations</a>
        </h1>

        <p class="description"> These languages are the backbone of every website, defining structure, content, and presentation.
        </p>
      </div>
      <div class="author">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper">
        <span>Greg Hooper</span>
      </div>
        
    </article> 
  </main>
    <footer class="attribution">

        Challenge by <a href="https://www.frontendmentor.io/profile/lidianofeliciobr" target="_blank">Frontend Mentor</a>. 
        Coded by <a href="https://github.com/lihsousa/blog-preview-card">Lidiano Felício</a>.

    </footer>
  
</body>
</html>
